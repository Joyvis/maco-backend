services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sleep infinity
    ports:
      - "${APP_HOST_PORT:-4000}:3000"
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-maco}:${DB_PASSWORD:-maco}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-maco}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME:-maco}
      DATABASE_USER: ${DB_USER:-maco}
      DATABASE_PASSWORD: ${DB_PASSWORD:-maco}
      NODE_ENV: development
      PORT: ${APP_PORT:-3000}
    networks:
      - dev
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-maco}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-maco}
      POSTGRES_DB: ${DB_NAME:-maco}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maco} -d ${POSTGRES_DB:-maco}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev

networks:
  dev:
    driver: bridge

volumes:
  postgres-data:
  node_modules:
