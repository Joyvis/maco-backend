services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    working_dir: /workspace
    command: sleep infinity
    network_mode: service:postgres
    environment:
      DATABASE_URL: postgresql://maco:maco@localhost:5432/maco
      NODE_ENV: development
      PORT: "3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: maco
      POSTGRES_PASSWORD: maco
      POSTGRES_DB: maco
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maco -d maco"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  node_modules:
