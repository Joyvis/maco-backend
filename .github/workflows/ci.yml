name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: Prettier check
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: maco_test
          POSTGRES_PASSWORD: maco_test
          POSTGRES_DB: maco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://maco_test:maco_test@localhost:5432/maco_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:cov

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: NestJS build
        run: pnpm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: maco-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
